name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install WASI toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld wasi-libc make

      - run: npm ci

      # npm run build chains its steps with `;`, which would mask a core
      # build failure; run them individually so each failure fails the job
      - name: Generate instruction table
        run: npm run table

      - name: Build WASM core
        run: npm run core

      - name: Build web UI
        run: npx vite build
