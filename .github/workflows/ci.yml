name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check

  core-regression:
    name: Core regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the core natively and diffs hashed machine state for the
      # BIOS and synthetic-exercise runs against the checked-in baselines
      - run: make -C core/test check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install WASI toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld wasi-libc make

      - run: npm ci

      # Equivalent to npm run build, but as separate steps so a failure
      # is attributed to the right stage in the job UI
      - name: Generate instruction table
        run: npm run table

      - name: Build WASM core
        run: npm run core

      - name: Build web UI
        run: npx vite build
